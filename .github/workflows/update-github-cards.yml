name: Update GitHub cards

on:
  schedule:
    # Every day at 03:00 UTC
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-cards:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Update GitHub streak cards
        run: |
          set -euo pipefail
          TS="$(date +%s)"
          curl -fsSL "https://streak-stats.demolab.com/?user=LuisBrose&theme=default&hide_border=true&ts=${TS}" -o public/gh-streak.svg
          curl -fsSL "https://streak-stats.demolab.com/?user=LuisBrose&theme=dark&hide_border=true&ts=${TS}" -o public/gh-streak-dark.svg

      - name: Update GitHub languages cards
        run: |
          set -euo pipefail
          TS="$(date +%s)"
          curl -fsSL "https://readme-stats-fast.vercel.app/api/top-langs/?username=LuisBrose&layout=compact&theme=default&hide_border=true&ts=${TS}" -o public/gh-langs.svg
          curl -fsSL "https://readme-stats-fast.vercel.app/api/top-langs/?username=LuisBrose&layout=compact&theme=dark&hide_border=true&ts=${TS}" -o public/gh-langs-dark.svg

      - name: "Debug: show git diff summary"
        run: |
          git status --porcelain
          git diff --stat || true

      - name: Commit and push updated cards
        env:
          GIT_AUTHOR_NAME: LuisBrose
          GIT_AUTHOR_EMAIL: 96488334+LuisBrose@users.noreply.github.com
          GIT_COMMITTER_NAME: github-actions[bot]
          GIT_COMMITTER_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
          PAT_GITHUB_CARDS: ${{ secrets.PAT_GITHUB_CARDS }}
        run: |
          set -euo pipefail

          # Only proceed if SVGs actually changed (tracked or untracked)
          if ! git status --porcelain -- public/gh-*.svg | grep . >/dev/null; then
            echo "No changes in GitHub cards. Skipping commit."
            exit 0
          fi

          git status --porcelain

          git add public/gh-*.svg
          git commit -m "chore: update GitHub streak and language cards"

          # Push using PAT so this push can trigger other workflows (e.g. deploy.yml)
          git push "https://x-access-token:${PAT_GITHUB_CARDS}@github.com/${GITHUB_REPOSITORY}.git" HEAD:"${GITHUB_REF_NAME}"
